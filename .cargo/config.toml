# Pin the linker to /usr/bin/gcc — avoids the conda-rustc default
# `-fuse-ld=lld` path that chokes on `__isoc23_strtol` from the
# openssl-sys build tree. Combined with the dev profile below,
# incremental builds drop from ~3 min to ~2 s on this box.
[target.x86_64-unknown-linux-gnu]
linker = "/usr/bin/gcc"

[build]
incremental = true
